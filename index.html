<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5f0e8">
<title>Mi Cuaderno</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Reenie+Beanie&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --paper:    #f5f0e8;
  --paper2:   #ede8dc;
  --paper3:   #e4ddd0;
  --line:     #c8bfaa;
  --line2:    #d8d0be;
  --margin:   #e8a0a0;
  --ink:      #2a2318;
  --ink2:     #4a4030;
  --pencil:   #5a5248;
  --faint:    #9a9080;
  --check:    #2d6a2d;
  --red:      #8a2020;
  --blue:     #1a3a6e;
  --gold:     #8a7020;
  --spiral:   #888078;
  --safe-t:   env(safe-area-inset-top, 0px);
  --safe-b:   env(safe-area-inset-bottom, 0px);
}

html { background: var(--paper); }
body {
  min-height: 100vh;
  background: var(--paper);
  color: var(--ink);
  font-family: 'Caveat', cursive;
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
  /* Subtle paper texture via repeating gradient */
  background-image:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 31px,
      var(--line2) 31px,
      var(--line2) 32px
    );
  background-size: 100% 32px;
}

/* ── SPIRAL BINDING (left side decoration) ── */
.spiral {
  position: fixed;
  left: 0; top: 0; bottom: 0;
  width: 32px;
  background: var(--paper2);
  border-right: 1px solid var(--line);
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: calc(var(--safe-t) + 20px);
  gap: 22px;
  overflow: hidden;
}

.spiral-ring {
  width: 18px; height: 18px;
  border: 2.5px solid var(--spiral);
  border-radius: 50%;
  flex-shrink: 0;
  position: relative;
  background: var(--paper);
}
.spiral-ring::after {
  content: '';
  position: absolute;
  top: 50%; left: -5px; right: -5px; height: 2px;
  background: var(--spiral);
  transform: translateY(-50%);
}

/* ── MARGIN LINE ── */
.margin-line {
  position: fixed;
  left: 68px; top: 0; bottom: 0;
  width: 1px;
  background: var(--margin);
  opacity: 0.5;
  z-index: 5;
  pointer-events: none;
}

/* ── MAIN CONTENT ── */
.notebook {
  margin-left: 32px;
  padding: calc(var(--safe-t) + 16px) 20px calc(var(--safe-b) + 40px) 44px;
  min-height: 100vh;
}

/* ── HEADER ── */
.nb-header {
  padding-bottom: 16px;
  border-bottom: 2px solid var(--line);
  margin-bottom: 4px;
}

.nb-date {
  font-family: 'Reenie Beanie', cursive;
  font-size: 14px;
  color: var(--faint);
  letter-spacing: .08em;
  margin-bottom: 2px;
}

.nb-title {
  font-family: 'Caveat', cursive;
  font-size: 38px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1;
  letter-spacing: -.01em;
}

.nb-subtitle {
  font-family: 'Reenie Beanie', cursive;
  font-size: 16px;
  color: var(--faint);
  margin-top: 2px;
}

/* ── STREAK BANNER ── */
.streak-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 0 8px;
  border-bottom: 1px solid var(--line2);
  margin-bottom: 8px;
}

.streak-icon { font-size: 22px; }

.streak-text {
  font-size: 20px;
  font-weight: 600;
  color: var(--gold);
}

.streak-label {
  font-family: 'Reenie Beanie', cursive;
  font-size: 15px;
  color: var(--faint);
}

/* ── SECTION TITLE ── */
.section-title {
  font-family: 'Reenie Beanie', cursive;
  font-size: 16px;
  color: var(--blue);
  letter-spacing: .06em;
  padding: 16px 0 10px;
  border-bottom: 1px dashed var(--line2);
  margin-bottom: 0;
}

/* ── HABIT ROW ── */
.habit-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 0;
  border-bottom: 1px solid var(--line2);
  cursor: pointer;
  transition: background .12s;
  border-radius: 0 4px 4px 0;
  position: relative;
  -webkit-user-select: none;
}

.habit-row:active { background: rgba(0,0,0,.03); }

/* checkbox hand-drawn style */
.habit-check {
  width: 26px; height: 26px;
  border: 2px solid var(--pencil);
  border-radius: 3px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  transition: all .18s;
  background: transparent;
  position: relative;
  /* Slightly rotated for handmade feel */
  transform: rotate(-1deg);
}

/* Wavy border effect */
.habit-check::before {
  content: '';
  position: absolute;
  inset: -1px;
  border: 1.5px solid transparent;
  border-radius: 3px;
}

.habit-row.done .habit-check {
  border-color: var(--check);
  background: rgba(45,106,45,.08);
}

.habit-row.done .habit-check::after {
  content: '✓';
  color: var(--check);
  font-size: 20px;
  font-weight: 700;
  font-family: 'Caveat', cursive;
}

.habit-info { flex: 1; min-width: 0; }

.habit-name {
  font-size: 22px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.1;
  transition: all .18s;
}

.habit-row.done .habit-name {
  color: var(--faint);
  text-decoration: line-through;
  text-decoration-color: var(--check);
}

.habit-streak-badge {
  font-family: 'Reenie Beanie', cursive;
  font-size: 13px;
  color: var(--faint);
  margin-top: 1px;
}

.habit-streak-badge.hot {
  color: var(--gold);
}

.habit-emoji {
  font-size: 22px;
  flex-shrink: 0;
  transition: transform .2s;
}
.habit-row:active .habit-emoji { transform: scale(1.2) rotate(10deg); }

/* ── PROGRESS SECTION ── */
.progress-section {
  padding: 20px 0 8px;
}

.progress-label {
  font-family: 'Reenie Beanie', cursive;
  font-size: 16px;
  color: var(--blue);
  margin-bottom: 10px;
  border-bottom: 1px dashed var(--line2);
  padding-bottom: 6px;
}

.progress-track {
  height: 12px;
  background: var(--paper3);
  border: 1.5px solid var(--line);
  border-radius: 0;
  overflow: hidden;
  margin-bottom: 6px;
  transform: rotate(-.3deg);
}

.progress-fill {
  height: 100%;
  background: repeating-linear-gradient(
    45deg,
    var(--check),
    var(--check) 4px,
    rgba(45,106,45,.4) 4px,
    rgba(45,106,45,.4) 8px
  );
  transition: width .5s cubic-bezier(.34,1.56,.64,1);
  width: 0%;
}

.progress-text {
  font-family: 'Reenie Beanie', cursive;
  font-size: 15px;
  color: var(--faint);
  text-align: right;
}

/* ── WEEKLY GRID ── */
.weekly-section {
  padding: 16px 0 8px;
}

.weekly-label {
  font-family: 'Reenie Beanie', cursive;
  font-size: 16px;
  color: var(--blue);
  margin-bottom: 12px;
  border-bottom: 1px dashed var(--line2);
  padding-bottom: 6px;
}

.week-habit {
  margin-bottom: 12px;
}

.week-habit-name {
  font-size: 14px;
  color: var(--pencil);
  margin-bottom: 5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.week-dots {
  display: flex;
  gap: 5px;
}

.week-dot {
  width: 28px; height: 28px;
  border: 1.5px solid var(--line);
  border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Reenie Beanie', cursive;
  font-size: 10px;
  color: var(--faint);
  flex-shrink: 0;
  transform: rotate(var(--r, 0deg));
  background: var(--paper);
}

.week-dot.filled {
  background: rgba(45,106,45,.12);
  border-color: var(--check);
}
.week-dot.filled::after { content: '✓'; font-size: 14px; color: var(--check); font-family: 'Caveat'; font-weight: 700; }
.week-dot.today { border-color: var(--blue); border-width: 2px; }

/* ── NOTA AL PIE ── */
.nb-note {
  font-family: 'Reenie Beanie', cursive;
  font-size: 15px;
  color: var(--faint);
  text-align: center;
  padding: 20px 0 0;
  border-top: 1px solid var(--line2);
  margin-top: 8px;
  font-style: italic;
}

/* ── RESET BUTTON ── */
.reset-row {
  text-align: center;
  padding: 16px 0 0;
}
.btn-reset {
  background: none;
  border: 1px dashed var(--line);
  color: var(--faint);
  font-family: 'Reenie Beanie', cursive;
  font-size: 14px;
  padding: 8px 20px;
  cursor: pointer;
  letter-spacing: .06em;
}
.btn-reset:active { background: var(--paper2); }

/* ── CONFETTI ── */
.confetti-piece {
  position: fixed;
  width: 8px; height: 8px;
  pointer-events: none;
  z-index: 999;
  animation: confettiFall 1.2s ease-in forwards;
}
@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh)  rotate(720deg); opacity: 0; }
}
</style>
</head>
<body>

<!-- Spiral binding -->
<div class="spiral" id="spiral"></div>
<div class="margin-line"></div>

<div class="notebook">

  <!-- Header -->
  <div class="nb-header">
    <div class="nb-date" id="nbDate"></div>
    <div class="nb-title">Mi Cuaderno</div>
    <div class="nb-subtitle">hábitos diarios ✦</div>
  </div>

  <!-- Streak -->
  <div class="streak-row">
    <span class="streak-icon">🔥</span>
    <span class="streak-text" id="streakNum">0</span>
    <span class="streak-label">días seguidos sin romper</span>
  </div>

  <!-- Hábitos -->
  <div class="section-title">— hoy —</div>
  <div id="habitList"></div>

  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-label">progreso de hoy</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText">0 / 6</div>
  </div>

  <!-- Weekly -->
  <div class="weekly-section">
    <div class="weekly-label">esta semana</div>
    <div id="weeklyGrid"></div>
  </div>

  <!-- Reset -->
  <div class="reset-row">
    <button class="btn-reset" onclick="resetDay()">↺ nuevo día</button>
  </div>

  <div class="nb-note">"Un día a la vez." — tú mismo</div>

</div>

<script>
// ═══════════════════════════════════════
// HÁBITOS
// ═══════════════════════════════════════
const HABITS = [
  { id:'porno',   emoji:'🚫', name:'Sin porno',           color:'#8a2020' },
  { id:'leer',    emoji:'📖', name:'Leer',                color:'#1a3a6e' },
  { id:'comer',   emoji:'🥗', name:'Comer mejor',         color:'#2d6a2d' },
  { id:'redes',   emoji:'📵', name:'Sin redes al despertar', color:'#6a3a1a' },
  { id:'dormir',  emoji:'🌙', name:'Dormir antes de medianoche', color:'#2a1a5a' },
  { id:'extra',   emoji:'💪', name:'Ejercicio',            color:'#1a4a4a' },
];

const DAYS = ['D','L','M','M','J','V','S'];

// ── STORAGE ──
function getKey(){ return 'habits_' + todayStr(); }
function todayStr(){
  const d=new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}
function weekKey(dayOffset){
  const d=new Date();
  d.setDate(d.getDate()-dayOffset);
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function loadToday(){
  const s=localStorage.getItem(getKey());
  return s ? JSON.parse(s) : {};
}
function saveToday(data){
  localStorage.setItem(getKey(), JSON.stringify(data));
}

function loadDay(dateStr){
  const s=localStorage.getItem('habits_'+dateStr);
  return s ? JSON.parse(s) : {};
}

// ── STREAK ──
function calcStreak(){
  let streak=0;
  for(let i=1; i<=60; i++){
    const key=weekKey(i);
    const data=loadDay(key);
    const done=HABITS.filter(h=>data[h.id]).length;
    if(done===HABITS.length) streak++;
    else break;
  }
  return streak;
}

function calcHabitStreak(habitId){
  let streak=0;
  for(let i=1; i<=60; i++){
    const data=loadDay(weekKey(i));
    if(data[habitId]) streak++;
    else break;
  }
  return streak;
}

// ── RENDER ──
let todayData = {};

function render(){
  todayData = loadToday();

  // Date
  const d=new Date();
  const months=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const dayNames=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  document.getElementById('nbDate').textContent =
    `${dayNames[d.getDay()]}, ${d.getDate()} de ${months[d.getMonth()]} ${d.getFullYear()}`;

  // Streak
  document.getElementById('streakNum').textContent = calcStreak();

  // Habits
  const list=document.getElementById('habitList');
  list.innerHTML='';
  HABITS.forEach((h,i)=>{
    const done=!!todayData[h.id];
    const hStreak=calcHabitStreak(h.id);
    const row=document.createElement('div');
    row.className='habit-row'+(done?' done':'');
    row.style.animationDelay=(i*60)+'ms';

    const rotations=['-1deg','1deg','-0.5deg','0.8deg','-1.2deg','0.5deg'];
    const checkRotation=rotations[i%rotations.length];

    row.innerHTML=`
      <div class="habit-check" style="transform:rotate(${checkRotation})"></div>
      <div class="habit-info">
        <div class="habit-name">${h.name}</div>
        <div class="habit-streak-badge ${hStreak>=3?'hot':''}">${hStreak>0?`🔥 ${hStreak} días`:''}</div>
      </div>
      <span class="habit-emoji">${h.emoji}</span>
    `;
    row.onclick=()=>toggle(h.id, row);
    list.appendChild(row);
  });

  // Progress
  const doneCount=HABITS.filter(h=>todayData[h.id]).length;
  const pct=Math.round((doneCount/HABITS.length)*100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressText').textContent=`${doneCount} de ${HABITS.length} hábitos`;

  // Weekly
  renderWeekly();
}

function renderWeekly(){
  const grid=document.getElementById('weeklyGrid');
  grid.innerHTML='';

  HABITS.forEach(h=>{
    const row=document.createElement('div');
    row.className='week-habit';
    row.innerHTML=`<div class="week-habit-name">${h.emoji} ${h.name}</div>`;
    const dots=document.createElement('div');
    dots.className='week-dots';

    for(let i=6; i>=0; i--){
      const dateStr=weekKey(i);
      const data=loadDay(dateStr);
      const done=!!data[h.id];
      const isToday=(i===0);
      const dotDay=new Date(); dotDay.setDate(dotDay.getDate()-i);
      const dot=document.createElement('div');
      const microRot=(Math.random()*.8-.4).toFixed(1)+'deg';
      dot.className='week-dot'+(done?' filled':'')+(isToday?' today':'');
      dot.style.setProperty('--r', microRot);
      if(!done) dot.textContent=DAYS[dotDay.getDay()];
      dots.appendChild(dot);
    }
    row.appendChild(dots);
    grid.appendChild(row);
  });
}

function toggle(id, row){
  todayData[id] = !todayData[id];
  saveToday(todayData);

  const wasDone = row.classList.contains('done');
  if(!wasDone) confetti(row);
  render();

  // All done?
  const doneCount=HABITS.filter(h=>todayData[h.id]).length;
  if(doneCount===HABITS.length) setTimeout(bigConfetti, 200);
}

function resetDay(){
  if(confirm('¿Resetear el día de hoy?')){
    localStorage.removeItem(getKey());
    render();
  }
}

// ── CONFETTI ──
function confetti(el){
  const rect=el.getBoundingClientRect();
  const colors=['#2d6a2d','#8a7020','#1a3a6e','#8a2020'];
  for(let i=0;i<6;i++){
    const piece=document.createElement('div');
    piece.className='confetti-piece';
    piece.style.cssText=`
      left:${rect.left+rect.width/2+Math.random()*60-30}px;
      top:${rect.top}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-delay:${Math.random()*.2}s;
      transform:rotate(${Math.random()*360}deg);
      border-radius:${Math.random()>.5?'50%':'2px'};
    `;
    document.body.appendChild(piece);
    setTimeout(()=>piece.remove(),1400);
  }
}

function bigConfetti(){
  for(let i=0;i<30;i++){
    const piece=document.createElement('div');
    piece.className='confetti-piece';
    const colors=['#2d6a2d','#8a7020','#1a3a6e','#d4af37','#8a2020','#5a3a8a'];
    piece.style.cssText=`
      left:${Math.random()*100}vw;
      top:-10px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-delay:${Math.random()*.6}s;
      width:${6+Math.random()*8}px;
      height:${6+Math.random()*8}px;
      border-radius:${Math.random()>.5?'50%':'2px'};
    `;
    document.body.appendChild(piece);
    setTimeout(()=>piece.remove(),1600);
  }
}

// ── SPIRAL RINGS ──
function buildSpiral(){
  const el=document.getElementById('spiral');
  for(let i=0;i<40;i++){
    const ring=document.createElement('div');
    ring.className='spiral-ring';
    el.appendChild(ring);
  }
}

buildSpiral();
render();
</script>
</body>
</html>
